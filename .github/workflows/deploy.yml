name: Deploy to GitHub Pages

# Este script se ejecuta cada vez que haces un "push" a la rama "main" o "master"
on:
  push:
    branches:
      - main
      - master

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevenir que corran dos publicaciones al mismo tiempo
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Añadir WebAssembly target
        run: rustup target add wasm32-unknown-unknown

      - name: Instalar Trunk (Empaquetador de Leptos)
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'

      - name: Construir el proyecto para producción
        run: trunk build --release --public-url /portafolio/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir la carpeta dist
        uses: actions/upload-pages-artifact@v3
        with:
          path: './target/site'

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4